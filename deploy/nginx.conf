# /etc/nginx/sites-available/mediaflow
# Replace bot.example.com with your real domain.
# After installing certbot, this block is auto-extended with SSL.

upstream mediaflow_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect (after certbot runs)
server {
    listen 80;
    listen [::]:80;
    server_name bot.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.example.com;

    # certbot will fill these in
    # ssl_certificate     /etc/letsencrypt/live/bot.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bot.example.com/privkey.pem;

    client_max_body_size 60M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss image/svg+xml;

    # Cache static assets
    location /css/ { proxy_pass http://mediaflow_app; expires 7d; add_header Cache-Control "public"; }
    location /js/  { proxy_pass http://mediaflow_app; expires 7d; add_header Cache-Control "public"; }
    location /img/ { proxy_pass http://mediaflow_app; expires 30d; add_header Cache-Control "public"; }

    # Telegram webhook + app
    location / {
        proxy_pass         http://mediaflow_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
